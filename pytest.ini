[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for API endpoints and database
    e2e: End-to-end tests for complete scenarios
    slow: Tests that take a long time to run

# Test paths
testpaths = tests

# Coverage options (if using pytest-cov)
# Uncomment when pytest-cov is installed
# addopts = --cov=app --cov-report=html --cov-report=term

# Ignore patterns
norecursedirs = .git .tox dist build *.egg venv

# Minimum Python version
minversion = 3.11
